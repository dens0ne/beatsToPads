<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beats to Pads</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<h1>Beats to Pads</h1>

<div class="panel">
  <div class="inputs">
    <div class="field">
      <label>Start</label>
      <input type="number" id="start" min="0" value="0" step="1" />
      <div class="hint">samples</div>
    </div>
    <div class="field">
      <label>End</label>
      <input type="number" id="end" value="88200" step="1" />
      <div class="hint">samples</div>
    </div>
    <div class="field full">
      <label>BPM</label>
      <input type="number" id="bpm" value="120" min="1" max="999" step="0.01" />
    </div>
  </div>
</div>

<div class="error" id="error"></div>

<div class="panel">
  <div class="results">

    <div class="row green">
      <span class="row-label">Beats in segment</span>
      <span class="row-value big" id="out-beats">4<span>beats</span></span>
    </div>

    <div class="row yellow" id="row-remove" title="Trim this many samples from the end to land exactly on the beat grid">
      <span class="row-label">Remove from end</span>
      <span class="row-value" id="out-remove">0<span>samples</span></span>
    </div>

    <div class="row yellow" id="row-add" title="Extend by this many samples to include one more full beat">
      <span class="row-label">Add to end</span>
      <span class="row-value" id="out-add">0<span>samples</span></span>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
